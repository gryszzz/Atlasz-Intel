<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Atlasz Intel Source Trail Card</title>
  <desc id="desc">A dark Atlasz Intel source trail card preview showing source identity, provenance, confidence, timestamp, payload hash, and official links.</desc>
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #7e8c98; font-size: 15px; letter-spacing: .12em; text-transform: uppercase; }
      .head { fill: #f2f7fa; font-size: 38px; font-weight: 700; }
      .text { fill: #dbe5ed; }
      .muted { fill: #82909b; }
      .panel { fill: #0d141a; stroke: #263541; stroke-width: 1; }
      .field { fill: #101a22; stroke: #22313c; stroke-width: 1; }
      .ok { fill: #78d293; }
      .warn { fill: #e4b65c; }
      .info { fill: #6aa6d8; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="#080d12"/>
  <rect x="34" y="32" width="1332" height="756" rx="18" fill="#091017" stroke="#263541"/>
  <text x="72" y="82" class="label sans">Evidence Surface</text>
  <text x="72" y="132" class="head sans">Crossref Metadata Source Trail</text>
  <text x="72" y="164" class="muted sans" font-size="18">Every rendered claim has a source, timestamp, confidence, and proof fields.</text>

  <rect x="128" y="216" width="1144" height="440" rx="18" class="panel"/>
  <text x="170" y="270" class="label sans">Official Source</text>
  <text x="170" y="314" class="text sans" font-size="32" font-weight="800">Crossref DOI metadata</text>
  <text x="170" y="352" class="muted sans" font-size="18">DOI registry metadata, not full text and not validation of research claims.</text>

  <g transform="translate(170 394)" class="sans">
    <rect width="318" height="74" rx="12" class="field"/>
    <text x="20" y="28" class="label">DOI</text>
    <text x="20" y="54" class="text mono" font-size="18">10.5555/example.2026.42</text>
    <g transform="translate(344 0)">
      <rect width="248" height="74" rx="12" class="field"/>
      <text x="20" y="28" class="label">Trust</text>
      <text x="20" y="54" class="ok mono" font-size="18">official-api</text>
    </g>
    <g transform="translate(618 0)">
      <rect width="222" height="74" rx="12" class="field"/>
      <text x="20" y="28" class="label">Confidence</text>
      <text x="20" y="54" class="ok mono" font-size="18">96%</text>
    </g>
    <g transform="translate(866 0)">
      <rect width="238" height="74" rx="12" class="field"/>
      <text x="20" y="28" class="label">Freshness</text>
      <text x="20" y="54" class="info mono" font-size="18">retrieved today</text>
    </g>
  </g>

  <g transform="translate(170 496)" class="sans">
    <rect width="520" height="96" rx="12" class="field"/>
    <text x="20" y="30" class="label">Payload Proof</text>
    <text x="20" y="60" class="text mono" font-size="18">sha256: 9f2d34c8b45a...</text>
    <text x="20" y="82" class="muted" font-size="16">raw payload JSON stored when practical</text>
    <g transform="translate(554 0)">
      <rect width="550" height="96" rx="12" class="field"/>
      <text x="20" y="30" class="label">Official Links</text>
      <text x="20" y="60" class="info mono" font-size="18">https://api.crossref.org/works?query=...</text>
      <text x="20" y="82" class="muted" font-size="16">mailto/API keys stripped from persisted URLs</text>
    </g>
  </g>

  <rect x="128" y="696" width="1144" height="58" rx="14" fill="#101a22" stroke="#30424f"/>
  <text x="164" y="731" class="warn mono" font-size="17">Boundary: source trail proves metadata provenance only. It does not validate technical claims or market impact.</text>
</svg>
