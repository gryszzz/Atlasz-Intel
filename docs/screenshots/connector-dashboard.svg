<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Atlasz Intel Connector Dashboard</title>
  <desc id="desc">A dark Atlasz Intel runtime connector dashboard preview showing public, key-gated, failed, and missing-key source states.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070a0d"/>
      <stop offset="1" stop-color="#111820"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #7e8c98; }
      .text { fill: #dbe5ed; }
      .fine { fill: #9aa8b3; font-size: 18px; }
      .label { fill: #7e8c98; font-size: 15px; letter-spacing: .12em; text-transform: uppercase; }
      .head { fill: #f2f7fa; font-size: 38px; font-weight: 700; }
      .panel { fill: #0d141a; stroke: #263541; stroke-width: 1; }
      .row { fill: #101a22; stroke: #22313c; stroke-width: 1; }
      .row2 { fill: #0c1319; stroke: #1e2b35; stroke-width: 1; }
      .ok { fill: #78d293; }
      .warn { fill: #e4b65c; }
      .bad { fill: #d35e65; }
      .info { fill: #6aa6d8; }
      .chip { font-size: 17px; font-weight: 700; }
      .small { font-size: 16px; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect x="34" y="32" width="1332" height="756" rx="18" fill="#091017" stroke="#263541"/>
  <text x="72" y="82" class="label sans">Runtime Audit</text>
  <text x="72" y="132" class="head sans">Connector Dashboard</text>
  <text x="72" y="164" class="fine sans">Every source keeps its own trust tier, status, persistence path, and proof surface.</text>

  <g transform="translate(74 202)">
    <rect width="180" height="78" rx="12" class="panel"/>
    <text x="22" y="33" class="ok mono" font-size="28" font-weight="800">13</text>
    <text x="22" y="59" class="muted sans small">online public</text>
  </g>
  <g transform="translate(274 202)">
    <rect width="180" height="78" rx="12" class="panel"/>
    <text x="22" y="33" class="warn mono" font-size="28" font-weight="800">8</text>
    <text x="22" y="59" class="muted sans small">missing key</text>
  </g>
  <g transform="translate(474 202)">
    <rect width="180" height="78" rx="12" class="panel"/>
    <text x="22" y="33" class="bad mono" font-size="28" font-weight="800">2</text>
    <text x="22" y="59" class="muted sans small">failed closed</text>
  </g>
  <g transform="translate(674 202)">
    <rect width="220" height="78" rx="12" class="panel"/>
    <text x="22" y="33" class="info mono" font-size="28" font-weight="800">official-api</text>
    <text x="22" y="59" class="muted sans small">dominant trust tier</text>
  </g>
  <g transform="translate(914 202)">
    <rect width="380" height="78" rx="12" class="panel"/>
    <text x="22" y="34" class="text mono" font-size="21" font-weight="800">npx tsx scripts/runtimeVerification.mts</text>
    <text x="22" y="59" class="muted sans small">operator proof command - no secret printing</text>
  </g>

  <g transform="translate(74 320)">
    <rect width="1252" height="52" rx="10" fill="#111f28" stroke="#30424f"/>
    <text x="24" y="33" class="label sans">Source</text>
    <text x="405" y="33" class="label sans">Status</text>
    <text x="598" y="33" class="label sans">Records</text>
    <text x="735" y="33" class="label sans">Persistence</text>
    <text x="955" y="33" class="label sans">Resolver / Exposure</text>
  </g>

  <g class="sans small">
    <g transform="translate(74 386)">
      <rect width="1252" height="64" rx="10" class="row"/>
      <text x="24" y="27" class="text" font-weight="700">Treasury Fiscal Data</text><text x="24" y="49" class="muted">government fiscal - official-api</text>
      <text x="405" y="39" class="ok chip">online</text><text x="602" y="39" class="text mono">3</text><text x="735" y="39" class="text mono">world_intel_events</text><text x="955" y="39" class="text">partial / curated-reference</text>
    </g>
    <g transform="translate(74 460)">
      <rect width="1252" height="64" rx="10" class="row2"/>
      <text x="24" y="27" class="text" font-weight="700">NOAA / NWS Alerts</text><text x="24" y="49" class="muted">weather disruption - official-api</text>
      <text x="405" y="39" class="ok chip">online</text><text x="602" y="39" class="text mono">30</text><text x="735" y="39" class="text mono">source_audit_log</text><text x="955" y="39" class="text">partial / curated-reference</text>
    </g>
    <g transform="translate(74 534)">
      <rect width="1252" height="64" rx="10" class="row"/>
      <text x="24" y="27" class="text" font-weight="700">OpenAlex Works</text><text x="24" y="49" class="muted">research metadata - official-api</text>
      <text x="405" y="39" class="warn chip">missing key</text><text x="602" y="39" class="text mono">0</text><text x="735" y="39" class="muted">not fetched</text><text x="955" y="39" class="muted">no exposure by design</text>
    </g>
    <g transform="translate(74 608)">
      <rect width="1252" height="64" rx="10" class="row2"/>
      <text x="24" y="27" class="text" font-weight="700">Crossref DOI Metadata</text><text x="24" y="49" class="muted">DOI registry metadata - official-api</text>
      <text x="405" y="39" class="ok chip">online</text><text x="602" y="39" class="text mono">23</text><text x="735" y="39" class="text mono">source trail UI</text><text x="955" y="39" class="muted">unresolved by design</text>
    </g>
    <g transform="translate(74 682)">
      <rect width="1252" height="64" rx="10" class="row"/>
      <text x="24" y="27" class="text" font-weight="700">SEC EDGAR</text><text x="24" y="49" class="muted">company disclosure - public-disclosure</text>
      <text x="405" y="39" class="warn chip">missing key</text><text x="602" y="39" class="text mono">0</text><text x="735" y="39" class="muted">no simulated filings</text><text x="955" y="39" class="text">yes / curated-reference</text>
    </g>
  </g>
</svg>
